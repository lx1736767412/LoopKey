name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当你推送以 v 开头的标签（如 v1.0）时触发
  workflow_dispatch: # 支持手动点击运行

jobs:
  build:
    runs-on: windows-latest # 必须用 windows 环境，自带 VS 编译器

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install Dependencies with uv
        run:
          uv sync
          uv pip install nuitka==4.0.5

      - name: Build with Nuitka
        run: |
          nuitka --standalone `
          --enable-plugin=tk-inter `
          --include-package-data=sv_ttk `
          --windows-disable-console `
          --windows-icon-from-ico=assets/icon.ico `
          --output-filename=LoopKey `
          main.py

      - name: Compress Build Folder
        run: |
          Compress-Archive -Path main.dist/* -DestinationPath LoopKey.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: LoopKey.zip
        env:
          GITHUB_TOKEN: ${{ secrets.ACTION_TOKEN }}
