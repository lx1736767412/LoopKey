name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当你推送以 v 开头的标签（如 v1.0）时触发
  workflow_dispatch: # 支持手动点击运行

jobs:
  build:
    runs-on: windows-latest # 必须用 windows 环境，自带 VS 编译器

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 建议与你本地开发版本一致
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install nuitka==4.0.5 sv-ttk
          # 如果你有 requirements.txt，执行下面这句：
          # pip install -r requirements.txt

      - name: Build with Nuitka
        run: |
          nuitka --standalone `
          --enable-plugin=tk-inter `
          --include-package-data=sv_ttk `
          --windows-disable-console `
          --windows-icon-from-ico=assets/icon.ico `
          --output-filename=LoopKey `
          --output-dir=dist `
          main.py

      - name: Compress Build Folder
        run: |
          Compress-Archive -Path dist/LoopKey.dist/* -DestinationPath LoopKey.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: LoopKey.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
